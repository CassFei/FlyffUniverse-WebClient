name: Build Client EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2019 # 该项目较老，使用VS2019环境兼容性最好

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet Packages
      run: nuget restore FlyffUniverse-WebClient.sln

    - name: Build Solution
      run: msbuild FlyffUniverse-WebClient.sln /p:Configuration=Release /p:Platform="x64"

    - name: Upload Finished Client
      uses: actions/upload-artifact@v4
      with:
        name: FlyffUniverse-CustomClient
        path: bin/x64/Release/
